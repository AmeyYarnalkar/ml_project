<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Performance Predictor</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        color: white;
        font-family: "Poppins", sans-serif;
        overflow: hidden;
      }

      /* GRID BACKGROUND */

      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
      }

      /* MOVING LIGHT PARTICLES */

      .light {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: white;
        filter: blur(180px);
        opacity: 0.25;
        z-index: -2;
        animation: moveLight 18s infinite alternate ease-in-out;
      }

      .light2 {
        animation-delay: 5s;
        opacity: 0.2;
      }

      /* LIGHT MOVEMENT */

      @keyframes moveLight {
        0% {
          transform: translate(-30vw, -20vh);
        }

        50% {
          transform: translate(30vw, 20vh);
        }

        100% {
          transform: translate(-10vw, 40vh);
        }
      }

      /* MAIN CARD */

      .container {
        text-align: center;
        padding: 70px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;

        backdrop-filter: blur(5px);

        box-shadow:
          0 0 20px rgba(255, 255, 255, 0.08),
          inset 0 0 10px rgba(255, 255, 255, 0.05);
      }

      /* TITLE */

      h1 {
        font-size: 52px;
        letter-spacing: 2px;
        margin-bottom: 20px;

        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      }

      /* SUBTITLE */

      p {
        font-size: 18px;
        color: #bbbbbb;
        margin-bottom: 50px;
        letter-spacing: 1px;
      }

      /* BUTTON */

      .btn {
        padding: 15px 40px;
        font-size: 18px;

        border: 1px solid white;
        border-radius: 12px;
        background: transparent;
        color: white;

        cursor: pointer;

        letter-spacing: 1px;

        transition: all 0.35s ease;

        position: relative;
      }

      .btn:hover {
        background: white;
        color: black;

        box-shadow:
          0 0 10px white,
          0 0 25px white,
          0 0 40px white;
      }

      /* FLOATING SCIENTIFIC LINES */

      .line {
        position: absolute;
        width: 2px;
        height: 120px;
        background: white;
        opacity: 0.05;
        animation: float 8s infinite linear;
      }

      .line:nth-child(1) {
        left: 10%;
      }
      .line:nth-child(2) {
        left: 30%;
        animation-delay: 2s;
      }
      .line:nth-child(3) {
        left: 70%;
        animation-delay: 4s;
      }
      .line:nth-child(4) {
        left: 90%;
        animation-delay: 6s;
      }

      @keyframes float {
        0% {
          transform: translateY(-200px);
        }

        100% {
          transform: translateY(120vh);
        }
      }
    </style>
  </head>

  <body>
    <!-- GLOWING LIGHTS -->
    <div class="light"></div>
    <div class="light light2"></div>

    <!-- SCIENTIFIC LINES -->
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>

    <div class="container">
      <h1>Student Performance Predictor</h1>

      <p>Predict student exam performance using Machine Learning</p>

      <button class="btn" onclick="window.location.href = '/predict_datapoint'">
        Start Prediction
      </button>
    </div>
  </body>
</html>
