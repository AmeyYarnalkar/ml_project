<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Performance Prediction</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        color: white;
        font-family: Poppins, Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* GRID BACKGROUND */

      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
      }

      /* GLOWING LIGHTS */

      .light {
        position: absolute;
        width: 450px;
        height: 450px;
        background: white;
        border-radius: 50%;
        filter: blur(180px);
        opacity: 0.25;
        animation: moveLight 18s infinite alternate ease-in-out;
        z-index: -2;
      }

      .light2 {
        animation-delay: 6s;
        opacity: 0.2;
      }

      @keyframes moveLight {
        0% {
          transform: translate(-30vw, -20vh);
        }

        50% {
          transform: translate(25vw, 20vh);
        }

        100% {
          transform: translate(-10vw, 40vh);
        }
      }

      /* FORM CARD */

      .container {
        width: 420px;

        padding: 40px;

        border: 1px solid rgba(255, 255, 255, 0.2);

        border-radius: 10px;

        backdrop-filter: blur(6px);

        box-shadow:
          0 0 25px rgba(255, 255, 255, 0.08),
          inset 0 0 10px rgba(255, 255, 255, 0.05);
      }

      /* TITLE */

      h1 {
        text-align: center;
        margin-bottom: 30px;
        letter-spacing: 1px;

        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      }

      /* LABEL */

      label {
        display: block;
        margin-top: 15px;
        font-size: 14px;
        letter-spacing: 0.5px;
      }

      /* INPUT FIELDS */

      input,
      select {
        width: 100%;

        padding: 11px;

        margin-top: 6px;

        border: 1px solid rgba(255, 255, 255, 0.4);

        background: black;

        color: white;

        outline: none;

        transition: 0.3s;
      }

      /* INPUT FOCUS */

      input:focus,
      select:focus {
        border: 1px solid white;

        box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      }

      /* BUTTON */

      button {
        margin-top: 28px;

        width: 100%;

        padding: 13px;

        border: 1px solid white;

        background: black;

        color: white;

        font-size: 16px;

        cursor: pointer;

        letter-spacing: 1px;

        transition: 0.35s;
      }

      /* BUTTON HOVER */

      button:hover {
        background: white;

        color: black;

        box-shadow:
          0 0 10px white,
          0 0 25px white,
          0 0 40px white;
      }
    </style>
  </head>

  <body>
    <div class="light"></div>
    <div class="light light2"></div>

    <div class="container">
      <h1>Student Score Predictor</h1>

      <form action="/predict_datapoint" method="POST">
        <label>Gender</label>
        <select name="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <label>Race/Ethnicity</label>
        <select name="race_ethnicity">
          <option value="group A">Group A</option>
          <option value="group B">Group B</option>
          <option value="group C">Group C</option>
          <option value="group D">Group D</option>
          <option value="group E">Group E</option>
        </select>

        <label>Parental Level of Education</label>
        <select name="parental_level_of_education">
          <option value="some high school">Some High School</option>
          <option value="high school">High School</option>
          <option value="some college">Some College</option>
          <option value="associate's degree">Associate's Degree</option>
          <option value="bachelor's degree">Bachelor's Degree</option>
          <option value="master's degree">Master's Degree</option>
        </select>

        <label>Lunch</label>
        <select name="lunch">
          <option value="standard">Standard</option>
          <option value="free/reduced">Free / Reduced</option>
        </select>

        <label>Test Preparation Course</label>
        <select name="test_preparation_course">
          <option value="none">None</option>
          <option value="completed">Completed</option>
        </select>

        <label>Reading Score</label>
        <input type="number" name="reading_score" required />

        <label>Writing Score</label>
        <input type="number" name="writing_score" required />

        <button type="submit">Predict Math Score</button>
      </form>
    </div>
  </body>
</html>
