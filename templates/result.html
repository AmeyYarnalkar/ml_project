<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prediction Result</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        color: white;
        font-family: Poppins, Arial, Helvetica, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      /* GRID BACKGROUND */

      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
      }

      /* MOVING LIGHTS */

      .light {
        position: absolute;
        width: 450px;
        height: 450px;
        border-radius: 50%;
        background: white;
        filter: blur(180px);
        opacity: 0.25;
        animation: moveLight 18s infinite alternate ease-in-out;
        z-index: -2;
      }

      .light2 {
        animation-delay: 6s;
        opacity: 0.2;
      }

      @keyframes moveLight {
        0% {
          transform: translate(-30vw, -20vh);
        }
        50% {
          transform: translate(30vw, 20vh);
        }
        100% {
          transform: translate(-10vw, 40vh);
        }
      }

      /* CARD */

      .container {
        text-align: center;
        padding: 60px;
        width: 420px;

        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;

        backdrop-filter: blur(6px);

        box-shadow:
          0 0 25px rgba(255, 255, 255, 0.08),
          inset 0 0 10px rgba(255, 255, 255, 0.05);
      }

      /* TITLE */

      h1 {
        margin-bottom: 20px;
        letter-spacing: 1px;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      }

      /* SCORE */

      .score {
        font-size: 48px;
        margin-top: 10px;
        margin-bottom: 15px;
        font-weight: bold;
      }

      /* CONFIDENCE BAR */

      .bar-container {
        width: 100%;
        height: 22px;

        border: 1px solid white;
        border-radius: 20px;

        overflow: hidden;

        margin-top: 10px;
      }

      .bar {
        height: 100%;

        width: 0%;

        background: white;

        transition: width 1.5s ease;
      }

      /* BUTTON */

      button {
        margin-top: 35px;
        padding: 12px 30px;

        border: 1px solid white;

        background: black;
        color: white;

        cursor: pointer;

        transition: 0.35s;
      }

      button:hover {
        background: white;
        color: black;

        box-shadow:
          0 0 10px white,
          0 0 25px white;
      }
    </style>
  </head>

  <body>
    <div class="light"></div>
    <div class="light light2"></div>

    <div class="container">
      <h1>Prediction Result</h1>

      <p>Predicted Math Score</p>

      <div class="score">0 / 100</div>

      <p>Model Confidence</p>

      <div class="bar-container">
        <div class="bar"></div>
      </div>

      <p style="margin-top: 10px">{{confidence}}%</p>

      <button onclick="window.location.href = '/'">
        Try Another Prediction
      </button>
    </div>

    <script>

      const targetScore = {{score}};
      const confidence = {{confidence}};

      const scoreElement = document.querySelector(".score");
      const bar = document.querySelector(".bar");

      let current = 0;

      const counter = setInterval(()=>{

      current++;

      scoreElement.innerText = current + " / 100";

      if(current >= targetScore){
      clearInterval(counter);
      }

      },20);


      setTimeout(()=>{
      bar.style.width = confidence + "%";
      },400);
    </script>
  </body>
</html>
